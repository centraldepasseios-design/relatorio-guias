name: Notificar Relatórios Pendentes

on:
  schedule:
    # 21h horário de Brasília = 00h UTC (Brasília é UTC-3)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite disparar manualmente também

jobs:
  notificar:
    runs-on: ubuntu-latest
    steps:
      - name: Notificar guias sem relatório
        run: |
          node -e "
          const https = require('https');

          const FIREBASE_KEY = '${{ secrets.FIREBASE_KEY }}';
          const ZAPI_URL = 'https://api.z-api.io/instances/3F32A3E55237818FBDBE36ADC5527576/token/ECA321B4DA2EB4B2FF4CB937/send-text';
          const ZAPI_TOKEN = 'F1b7c26e0ce09416fbc813a307ce5f298S';

          const CONTATOS = ${{ secrets.CONTATOS_GUIAS }};

          function req(url, method, body, headers) {
            return new Promise((resolve, reject) => {
              const u = new URL(url);
              const opts = {
                hostname: u.hostname,
                path: u.pathname + u.search,
                method: method || 'GET',
                headers: { 'Content-Type': 'application/json', ...headers }
              };
              const r = https.request(opts, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => resolve(JSON.parse(data)));
              });
              r.on('error', reject);
              if (body) r.write(JSON.stringify(body));
              r.end();
            });
          }

          async function main() {
            const hoje = new Date();
            // Ajusta para horário de Brasília (UTC-3)
            hoje.setHours(hoje.getHours() - 3);
            const data = hoje.toISOString().slice(0, 10);
            const dataFmt = String(hoje.getDate()).padStart(2,'0') + '/' + String(hoje.getMonth()+1).padStart(2,'0');

            console.log('Verificando relatórios para', data);

            const projectId = 'relatorio-guias';
            const baseUrl = \`https://firestore.googleapis.com/v1/projects/\${projectId}/databases/(default)/documents\`;

            // Busca escalas do dia
            const escRes = await req(\`\${baseUrl}/escalas?pageSize=200\`, 'GET', null, { 'Authorization': 'Bearer ' + FIREBASE_KEY });
            const escalas = (escRes.documents || [])
              .map(d => d.fields)
              .filter(f => f && f.data && f.data.stringValue === data && f.guia)
              .map(f => f.guia.stringValue);

            const guiasEscala = [...new Set(escalas)];
            if (!guiasEscala.length) {
              console.log('Nenhuma escala para hoje');
              return;
            }
            console.log('Guias escalados:', guiasEscala.join(', '));

            // Busca relatórios do dia
            const relRes = await req(\`\${baseUrl}/relatorios?pageSize=200\`, 'GET', null, { 'Authorization': 'Bearer ' + FIREBASE_KEY });
            const comRelatorio = new Set(
              (relRes.documents || [])
                .map(d => d.fields)
                .filter(f => f && f.data && f.data.stringValue === data && f.guia)
                .map(f => f.guia.stringValue)
            );

            const pendentes = guiasEscala.filter(g => !comRelatorio.has(g));
            if (!pendentes.length) {
              console.log('Todos enviaram relatório!');
              return;
            }

            console.log('Pendentes:', pendentes.join(', '));

            // Envia WhatsApp para cada pendente
            for (const guia of pendentes) {
              const fone = CONTATOS[guia] || Object.entries(CONTATOS).find(([k]) =>
                k === guia || k.startsWith(guia.split(' ')[0]) || guia.startsWith(k.split(' ')[0])
              )?.[1];

              if (!fone) {
                console.log('Sem número para', guia);
                continue;
              }

              const msg = '*LUCK RECEPTIVO*\n\n⚠️ Olá, *' + guia + '*!\n\nVocê ainda não enviou o relatório do dia *' + dataFmt + '*.\n\nPor favor, acesse o app e registre agora:\nhttps://centraldepasseios-design.github.io/relatorio-guias/';

              try {
                await req(ZAPI_URL, 'POST', { phone: fone, message: msg }, { 'Client-Token': ZAPI_TOKEN });
                console.log('✅ WPP enviado para', guia, '(' + fone + ')');
                await new Promise(r => setTimeout(r, 600));
              } catch(e) {
                console.log('❌ Erro para', guia, e.message);
              }
            }
          }

          main().catch(console.error);
          "
