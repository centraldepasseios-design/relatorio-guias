name: Notificar Relatórios Pendentes

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  notificar:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar firebase-admin
        run: npm install firebase-admin

      - name: Salvar arquivos de configuração
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          CONTATOS_GUIAS: ${{ secrets.CONTATOS_GUIAS }}
        run: |
          echo "$FIREBASE_CREDENTIALS" > firebase-credentials.json
          echo "$CONTATOS_GUIAS" > contatos.json

      - name: Criar e executar script
        env:
          ZAPI_CLIENT_TOKEN: ${{ secrets.ZAPI_CLIENT_TOKEN }}
        run: |
          cat > notificar.mjs << 'SCRIPT'
          import { initializeApp, cert } from 'firebase-admin/app';
          import { getFirestore } from 'firebase-admin/firestore';
          import { readFileSync } from 'fs';

          const credentials = JSON.parse(readFileSync('firebase-credentials.json', 'utf8'));
          const contatos = JSON.parse(readFileSync('contatos.json', 'utf8'));
          const zapiToken = process.env.ZAPI_CLIENT_TOKEN;
          const ZAPI_URL = 'https://api.z-api.io/instances/3F32A3E55237818FBDBE36ADC5527576/token/ECA321B4DA2EB4B2FF4CB937/send-text';

          initializeApp({ credential: cert(credentials) });
          const db = getFirestore();

          function buscarFone(guia) {
            if (contatos[guia]) return contatos[guia];
            const key = Object.keys(contatos).find(k =>
              k === guia ||
              k.split(' ')[0] === guia.split(' ')[0] ||
              guia.startsWith(k) || k.startsWith(guia)
            );
            return key ? contatos[key] : null;
          }

          async function enviarWpp(phone, message) {
            const res = await fetch(ZAPI_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Client-Token': zapiToken },
              body: JSON.stringify({ phone, message })
            });
            return res.json();
          }

          async function main() {
            const agora = new Date();
            const brasiliaTime = new Date(agora.getTime() + (-3 * 60 * 60000));
            const data = brasiliaTime.toISOString().slice(0, 10);
            const dataFmt = String(brasiliaTime.getDate()).padStart(2,'0') + '/' + String(brasiliaTime.getMonth()+1).padStart(2,'0');
            console.log('Data:', data);

            const escSnap = await db.collection('escalas').where('data', '==', data).get();
            const guiasEscala = [...new Set(escSnap.docs.map(d => d.data().guia))];
            if (!guiasEscala.length) { console.log('Sem escala hoje.'); return; }
            console.log('Escalados:', guiasEscala.join(', '));

            const relSnap = await db.collection('relatorios').where('data', '==', data).get();
            const comRelatorio = new Set(relSnap.docs.map(d => d.data().guia));
            const pendentes = guiasEscala.filter(g => !comRelatorio.has(g));

            if (!pendentes.length) { console.log('Todos enviaram!'); return; }
            console.log('Pendentes:', pendentes.join(', '));

            let enviados = 0;
            for (const guia of pendentes) {
              const fone = buscarFone(guia);
              if (!fone) { console.log('Sem numero:', guia); continue; }
              const msg = '*LUCK RECEPTIVO*\n\nOla, *' + guia + '*!\n\nVoce ainda nao enviou o relatorio do dia *' + dataFmt + '*.\n\nAcesse o app:\nhttps://centraldepasseios-design.github.io/relatorio-guias/';
              try {
                await enviarWpp(fone, msg);
                console.log('Enviado para', guia);
                enviados++;
                await new Promise(r => setTimeout(r, 700));
              } catch(e) { console.log('Erro:', guia, e.message); }
            }
            console.log('Total enviados:', enviados + '/' + pendentes.length);
          }

          main().catch(e => { console.error('ERRO:', e.message); process.exit(1); });
          SCRIPT
          node notificar.mjs
