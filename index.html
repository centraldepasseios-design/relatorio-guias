<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luck Receptivo — Guias</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#f5f4f0;--surface:#fff;--border:rgba(0,0,0,0.1);--border-mid:rgba(0,0,0,0.18);--text:#1a1a18;--muted:#6b6b67;--hint:#9a9a96;--accent:#1a1a18;--red:#c0392b;--green:#0f6e56;--radius:12px;--rsm:8px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1rem 1rem 5rem}
    .app{max-width:460px;margin:0 auto}
    .login-screen{padding-top:2rem}
    .login-header{text-align:center;margin-bottom:1.5rem}
    .login-header img{width:160px;height:auto;margin-bottom:8px}
    .login-header p{font-size:13px;color:var(--muted);margin-top:4px}
    .card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:1.25rem;margin-bottom:12px}
    label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:5px;margin-top:14px;text-transform:uppercase;letter-spacing:.4px}
    label:first-child{margin-top:0}
    input,select,textarea{width:100%;padding:10px 12px;font-size:15px;font-family:'DM Sans',sans-serif;border:1px solid var(--border);border-radius:var(--rsm);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
    input:focus,select:focus,textarea:focus{border-color:var(--border-mid);background:#fff}
    .btn{width:100%;padding:13px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;background:var(--accent);color:#fff;border:none;border-radius:var(--rsm);cursor:pointer;transition:opacity .15s}
    .btn:hover{opacity:.85}
    .btn:disabled{opacity:.3;cursor:default}
    .btn-outline{background:none;border:1px solid var(--border);color:var(--muted)}
    .btn-outline:hover{background:var(--surface)}
    .err-msg{font-size:13px;color:var(--red);display:none;padding:8px 12px;background:#fde8e8;border-radius:var(--rsm);margin-bottom:10px}
    .link-btn{background:none;border:none;color:var(--muted);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;text-decoration:underline;margin-top:12px;display:block;text-align:center}
    .hidden{display:none!important}
    .main-screen{display:none}
    .header{text-align:center;padding:1.5rem 0 1rem}
    .header img{width:130px;height:auto;margin-bottom:6px}
    .header p{font-size:13px;color:var(--muted);margin-top:4px}
    .status-ok{font-size:11px;padding:4px 10px;border-radius:99px;background:#e1f5ee;color:var(--green);display:inline-block;margin-top:4px}
    .user-bar{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.85rem 1.1rem;margin-bottom:1rem}
    .user-bar span{font-size:14px;font-weight:500}
    .btn-logout{background:none;border:1px solid var(--border);border-radius:var(--rsm);padding:5px 12px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--muted);cursor:pointer}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:1rem}
    .tab{padding:10px 6px;text-align:center;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;background:transparent;color:var(--muted);border:none;transition:all .15s;line-height:1.3}
    .tab.active{background:var(--accent);color:#fff;font-weight:500}
    .section{display:none}
    .section.active{display:block}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0}
    .servico-card{background:var(--bg);border-radius:var(--rsm);border:1px solid var(--border);padding:1rem;margin-bottom:10px}
    .servico-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .servico-num{font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
    .btn-remover{background:none;border:none;color:var(--hint);cursor:pointer;font-size:20px;line-height:1;padding:2px}
    .btn-remover:hover{color:var(--red)}
    .btn-add{width:100%;padding:11px;font-size:14px;font-family:'DM Sans',sans-serif;background:transparent;color:var(--muted);border:1px dashed var(--border-mid);border-radius:var(--rsm);cursor:pointer;margin-bottom:1rem;transition:all .15s}
    .btn-add:hover{background:var(--surface);color:var(--text)}
    .resumo-envio{background:var(--surface);border-radius:var(--rsm);border:1px solid var(--border);padding:.75rem 1rem;margin-bottom:1rem}
    .resumo-envio p{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
    .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
    .badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px}
    .badge-chegada{background:#e1f5ee;color:#0f6e56}
    .badge-saida{background:#e6f1fb;color:#185fa5}
    .badge-apoio{background:#faeeda;color:#854f0b}
    .badge-trf{background:#eeedfe;color:#534ab7}
    .success-box{display:none;text-align:center;padding:2rem 1rem;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-top:1rem}
    .success-box .icon{font-size:36px;margin-bottom:10px}
    .success-box h2{font-size:17px;font-weight:500;margin-bottom:6px}
    .success-box p{font-size:13px;color:var(--muted);margin-bottom:1.25rem}
    .resumo-hist{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
    .resumo-card{background:var(--surface);border-radius:var(--rsm);border:1px solid var(--border);padding:.75rem .5rem;text-align:center}
    .resumo-card .num{font-size:16px;font-weight:500}
    .resumo-card .lbl{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.3px}
    .rel-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:1rem 1.1rem;margin-bottom:10px}
    .rel-dia{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
    .sub-card{padding:8px 0;border-bottom:1px solid var(--border)}
    .sub-card:last-child{border-bottom:none;padding-bottom:0}
    .sub-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
    .sub-body{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px}
    .sub-item label{font-size:10px;color:var(--muted);margin:0;text-transform:uppercase;letter-spacing:.3px}
    .sub-item p{color:var(--text);margin:0;font-size:13px}
    .obs-text{font-size:12px;color:var(--muted);margin-top:6px;white-space:pre-line}
    .empty{text-align:center;padding:2.5rem 0;color:var(--hint);font-size:14px}
    /* ESCALA */
    .escala-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
    .escala-header{background:var(--accent);color:#fff;padding:.75rem 1rem;font-size:13px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
    .escala-body{padding:1rem}
    .escala-row{display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border)}
    .escala-row:last-child{border-bottom:none;padding-bottom:0}
    .escala-horario{background:#fde8e8;color:var(--red);font-weight:500;font-size:13px;padding:4px 10px;border-radius:99px;white-space:nowrap}
    .escala-info{flex:1}
    .escala-servico{font-size:14px;font-weight:500}
    .escala-motorista{font-size:12px;color:var(--muted);margin-top:2px}
    .escala-pax{font-size:12px;color:var(--green);font-weight:500;margin-top:2px}
    .no-escala{text-align:center;padding:2rem;color:var(--hint);font-size:14px}
    .btn-ciente{width:100%;padding:14px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;background:#0f6e56;color:#fff;border:none;border-radius:var(--rsm);cursor:pointer;transition:opacity .15s}
    .btn-ciente:hover{opacity:.85}
    .ciente-confirmado{width:100%;padding:14px;font-size:15px;font-weight:500;text-align:center;background:#e1f5ee;color:#0f6e56;border-radius:var(--rsm);border:1px solid #b2dfdb}
    .disp-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:1.25rem;margin-bottom:12px}
    .disp-card h3{font-size:15px;font-weight:600;margin-bottom:1rem}
    .disp-date-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
    .disp-date-row:last-child{border-bottom:none}
    .disp-date{font-size:14px;font-weight:500}
    .disp-date small{display:block;font-size:11px;color:var(--muted);font-weight:400}
    .disp-btns{display:flex;gap:6px}
    .btn-disp{padding:6px 14px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;border-radius:99px;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
    .btn-disp.sim{background:#e1f5ee;color:#0f6e56;border-color:#b2dfdb}
    .btn-disp.sim.ativo{background:#0f6e56;color:#fff}
    .btn-disp.nao{background:#fde8e8;color:#c0392b;border-color:#f5c6c6}
    .btn-disp.nao.ativo{background:#c0392b;color:#fff}
    .idioma-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .idioma-chip{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--bg);font-size:13px;cursor:pointer;transition:all .15s}
    .idioma-chip.ativo{background:#e6f1fb;border-color:#185fa5;color:#185fa5;font-weight:500}
    .loading-overlay{position:fixed;inset:0;background:rgba(245,244,240,.8);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
    .loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>

// ---- NOTIFICAÇÕES IN-APP ----
async function verificarNotificacoes(guia){
  try{
    const snap=await window._getDocs(window._query(
      window._collection(window._db,'notificacoes'),
      window._where('guia','==',guia),
      window._where('lida','==',false)
    ));
    if(!snap.docs.length)return;
    // Mostra banner para cada notificação não lida
    for(const d of snap.docs){
      const n=d.data();
      mostrarBannerNotif(n.titulo,n.mensagem);
      // Marca como lida
      await window._setDoc(window._doc(window._db,'notificacoes',d.id),{...n,lida:true});
      // Pequeno delay entre banners
      await new Promise(r=>setTimeout(r,500));
    }
  }catch(e){console.log('Notif error:',e.message)}
}

function mostrarBannerNotif(titulo,mensagem){
  const banner=document.createElement('div');
  banner.style.cssText='position:fixed;top:0;left:0;right:0;background:#e67e22;color:#fff;padding:12px 16px;z-index:9999;font-family:DM Sans,sans-serif;font-size:14px;display:flex;justify-content:space-between;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,0.2)';
  banner.innerHTML=`<div><strong>${titulo}</strong><br><span style="font-size:12px">${mensagem}</span></div><button onclick="this.parentElement.remove()" style="background:rgba(255,255,255,0.3);border:none;color:#fff;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px">✕</button>`;
  document.body.prepend(banner);
  // Auto remove after 10s
  setTimeout(()=>{if(banner.parentElement)banner.remove()},10000);
}

function filtrarNomes(){
  const busca=document.getElementById('login-busca-nome').value.toUpperCase();
  const dropdown=document.getElementById('login-dropdown');
  // Limpa seleção ao digitar
  document.getElementById('login-guia-select').value='';
  document.getElementById('nome-selecionado').style.display='none';
  if(!busca){dropdown.style.display='none';return}
  const filtrados=TODOS_NOMES.filter(n=>n.includes(busca));
  if(!filtrados.length){dropdown.style.display='none';return}
  dropdown.innerHTML=filtrados.map(n=>`<div onclick="selecionarNome('${n}')" style="padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border)" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background=''">${n}</div>`).join('');
  dropdown.style.display='block';
}

function selecionarNome(nome){
  document.getElementById('login-busca-nome').value=nome;
  document.getElementById('login-guia-select').value=nome;
  document.getElementById('login-dropdown').style.display='none';
  const el=document.getElementById('nome-selecionado');
  el.textContent='✅ '+nome+' selecionado';
  el.style.display='block';
}

function selecionarPrimeiro(){
  const busca=document.getElementById('login-busca-nome').value.toUpperCase();
  const filtrado=TODOS_NOMES.find(n=>n.includes(busca));
  if(filtrado)selecionarNome(filtrado);
}

  const el=document.getElementById('escala-conteudo');
  el.innerHTML='<p class="empty">Carregando escala...</p>';

  try{

      window._collection(window._db,'escalas'),
      window._where('data','==',hoje()),
      window._where('guia','==',guiaAtual)
    ));
    const itens=snap.docs.map(d=>d.data());
    hideLoading();
    if(!itens.length){
      el.innerHTML='<div class="no-escala">📭 Nenhum serviço escalado para hoje.<br><small>Consulte seu coordenador.</small></div>';
      return;
    }
    // Verifica confirmação
    let jaConfirmou=false;
    try{
      const confSnap=await window._getDoc(window._doc(window._db,'confirmacoes',hoje()+'_'+guiaAtual));
      jaConfirmou=confSnap.exists();
    }catch(e){}
    const LBLS={'chegada-porto':'Chegada Porto','chegada-cabo':'Chegada Cabo','chegada-maragogi':'Chegada Maragogi','chegada-recife':'Chegada Recife','saida-porto':'Saída Porto','saida-cabo':'Saída Cabo','saida-maragogi':'Saída Maragogi','saida-recife':'Saída Recife','apoio-porto':'Apoio Porto','apoio-recife':'Apoio Recife','trf':'TRF'};
    const dataFmt=new Date(hoje()+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'});
    let rows=itens.map(it=>`
      <div class="escala-row">
        <div><span class="escala-horario">⏰ ${it.horario}</span></div>
        <div class="escala-info">
          <div class="escala-servico">${LBLS[it.servico]||it.servico}</div>
          ${it.voo?`<div style="font-size:12px;color:var(--muted);margin-top:2px">✈️ ${it.voo}</div>`:''}
          ${it.pax?`<div class="escala-pax">👥 ${it.pax} pax</div>`:''}

  }catch(e){hideLoading();el.innerHTML='<p class="empty">Erro ao carregar escala.</p>';console.error(e)}
}

// ---- DISPONIBILIDADE ----
const IDIOMAS=['Português','Inglês','Espanhol','Francês','Italiano','Alemão'];

async function carregarDisponibilidade(){
  const el=document.getElementById('disp-conteudo');
  if(!window._fbReady||!guiaAtual)return;
  showLoading();
  try{
    // Carrega idiomas salvos
    const guiaDoc=await window._getDoc(window._doc(window._db,'guias',guiaAtual));
    const idiomasSalvos=guiaDoc.exists()&&guiaDoc.data().idiomas?guiaDoc.data().idiomas:[];
    // Gera próximos 7 dias
    const dias=[];
    for(let i=0;i<7;i++){
      const d=new Date();d.setDate(d.getDate()+i);
      dias.push(d.toISOString().slice(0,10));
    }
    // Carrega disponibilidades já salvas (busca por guia, filtra datas no cliente)
    const dispSnap=await window._getDocs(window._query(
      window._collection(window._db,'disponibilidades'),
      window._where('guia','==',guiaAtual)
    ));
    window.dispMap_global={};
    const dispMap=window.dispMap_global;
    const obsMap={};
    const confirmMap={};
    dispSnap.docs.forEach(d=>{
      const dd=d.data();
      if(dd.data>=dias[0]&&dd.data<=dias[6]){
        dispMap[dd.data]=dd.status;
        if(dd.obs)obsMap[dd.data]=dd.obs;
        if(dd.confirmado)confirmMap[dd.data]=true;
      }
    });
    hideLoading();

    const diasRows=dias.map(data=>{
      const d=new Date(data+'T12:00:00');
      const fmt=d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
      const diaSem=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][d.getDay()];
      const status=dispMap[data]||'';
      const obs=obsMap[data]||'';
      const confirmado=confirmMap[data]||false;
      if(confirmado){
        const statusLabel=status==='sim'?'✅ Disponível':status==='nao'?'❌ Indisponível':'⬜ Não informado';
        const cor=status==='sim'?'#e1f5ee;color:#0f6e56':status==='nao'?'#fde8e8;color:#c0392b':'#f0f0f0;color:#9a9a96';
        return`<div class="disp-date-row" style="flex-direction:column;align-items:stretch;gap:6px;opacity:0.85">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="disp-date">${diaSem}<small>${fmt}</small></div>
            <div style="display:flex;gap:6px;align-items:center">
              <span style="background:${cor};padding:4px 12px;border-radius:99px;font-size:12px;font-weight:500">${statusLabel}</span>
              <span style="font-size:11px;color:var(--muted)">🔒 Confirmado</span>
            </div>
          </div>
          ${obs?`<div style="font-size:13px;color:var(--muted);padding:6px 10px;background:var(--bg);border-radius:var(--rsm);border:1px solid var(--border)">📝 ${obs}</div>`:''}
        </div>`;
      }
      return`<div class="disp-date-row" style="flex-direction:column;align-items:stretch;gap:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
          <div class="disp-date">${diaSem}<small>${fmt}</small></div>
          <div class="disp-btns">
            <button class="btn-disp sim${status==='sim'?' ativo':''}" onclick="marcarDisp('${data}','sim',this)">✅ Disponível</button>
            <button class="btn-disp nao${status==='nao'?' ativo':''}" onclick="marcarDisp('${data}','nao',this)">❌ Indisponível</button>
          </div>
        </div>
        <input type="text" placeholder="Restrição de horário ou observação (opcional)" value="${obs}" onblur="salvarObsDisp('${data}',this.value)" style="font-size:13px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--rsm);background:var(--bg);width:100%"/>
        <button class="btn-ciente btn-confirmar-dia" style="background:#534ab7;font-size:13px;padding:9px;display:${status?'block':'none'}" onclick="confirmarDia('${data}',this)">🔒 Confirmar e bloquear este dia</button>
      </div>`;
    }).join('');

    el.innerHTML=`
      <div class="disp-card">
        <h3>📆 Minha disponibilidade — próximos 7 dias</h3>
        ${diasRows}
      </div>`;
  }catch(e){hideLoading();el.innerHTML='<p class="empty">Erro ao carregar.</p>';console.error(e)}
}

async function renderHistorico(){
  if(!guiaAtual||!window._fbReady)return;
  const mes=document.getElementById('filtro-mes').value||mesAtual();
  const inicio=mes+'-01';
  const[ano,m]=mes.split('-').map(Number);
  const fim=new Date(ano,m,1).toISOString().slice(0,10);
  showLoading();
  try{
    const q=window._query(window._collection(window._db,'relatorios'),window._where('guia','==',guiaAtual),window._where('data','>=',inicio),window._where('data','<',fim),window._orderBy('data','desc'));
    const snap=await window._getDocs(q);
    const lista=snap.docs.map(d=>({id:d.id,...d.data()}));
    let ts=0,tp=0,tv=0,tn=0;
    lista.forEach(r=>r.itens.forEach(it=>{ts++;if(isChegada(it.servico))tp+=(it.pax||0);if(it.vendas)tv+=it.vendas;if(it.noshow)tn+=it.noshow}));
    document.getElementById('resumo-hist').innerHTML=`<div class="resumo-card"><div class="num">${ts}</div><div class="lbl">serviços</div></div><div class="resumo-card"><div class="num">${tp}</div><div class="lbl">pax</div></div><div class="resumo-card"><div class="num">R$${tv.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><div class="lbl">vendas</div></div><div class="resumo-card"><div class="num">${tn}</div><div class="lbl">no-show</div></div>`;
    if(!lista.length){document.getElementById('lista-relatorios').innerHTML='<p class="empty">Nenhum relatório neste mês.</p>';return}
    document.getElementById('lista-relatorios').innerHTML=lista.map(r=>{
      const dataFmt=new Date(r.data+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'short'});
      const itensHtml=r.itens.map(it=>{
        let campos='';
        if(isChegada(it.servico))campos=`<div class="sub-item"><label>Voo</label><p>${it.voo||'—'}</p></div><div class="sub-item"><label>Pax</label><p>${it.pax??0}</p></div><div class="sub-item"><label>Chd</label><p>${it.chd??0}</p></div><div class="sub-item"><label>Vendas</label><p>R$ ${(it.vendas||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</p></div><div class="sub-item"><label>No-show</label><p>${it.noshow??0} pax</p></div>`;
        else if(isSaida(it.servico))campos=`<div class="sub-item"><label>No-show</label><p>${it.noshow??0} pax</p></div>`;
        else campos=`<div class="sub-item"><label>Vendas</label><p>R$ ${(it.vendas||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</p></div><div class="sub-item"><label>No-show</label><p>${it.noshow??0} pax</p></div>`;
        return`<div class="sub-card"><div class="sub-header"><span class="badge ${BADGE[it.servico]||''}">${LABELS[it.servico]||it.servico}</span></div><div class="sub-body">${campos}</div>${it.obs?`<p class="obs-text">📝 ${it.obs}</p>`:''}</div>`;
      }).join('');
      return`<div class="rel-card"><div class="rel-dia"><span>${dataFmt} · ${r.motorista}</span><span>${r.itens.length} serviço${r.itens.length>1?'s':''}</span></div>${itensHtml}</div>`;
    }).join('');
  }catch(e){document.getElementById('lista-relatorios').innerHTML='<p class="empty">Erro ao carregar.</p>';console.error(e)}finally{hideLoading()}
}
</script>
<!-- MODAL IDIOMAS -->
<div class="loading-overlay" id="modal-idiomas" style="display:none;z-index:200">
  <div style="background:var(--surface);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:400px;margin:1rem">
    <h3 style="font-size:16px;font-weight:600;margin-bottom:6px">🌍 Meus idiomas</h3>
    <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">Selecione os idiomas que você atende:</p>
    <div class="idioma-wrap" id="modal-idioma-chips"></div>
    <div style="display:flex;gap:8px;margin-top:1.25rem">
      <button class="btn-ciente" style="background:var(--accent)" onclick="fecharIdiomas()">Cancelar</button>
      <button class="btn-ciente" onclick="salvarIdiomas()">💾 Salvar</button>
    </div>
  </div>
</div>
</body>
