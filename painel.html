<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin — Relatórios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f0; --surface: #ffffff;
      --border: rgba(0,0,0,0.1); --border-mid: rgba(0,0,0,0.18);
      --text: #1a1a18; --text-muted: #6b6b67; --text-hint: #9a9a96;
      --accent: #1a1a18; --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1rem 1rem 4rem; }

    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.5rem 2rem; width: 100%; max-width: 360px; text-align: center; }
    .login-box .logo { font-size: 32px; margin-bottom: 12px; }
    .login-box h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .login-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; }
    .login-box input { width: 100%; padding: 11px 14px; font-size: 15px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; margin-bottom: 12px; text-align: center; letter-spacing: 2px; }
    .login-box input:focus { border-color: var(--border-mid); background: #fff; }
    .login-err { font-size: 13px; color: #c0392b; margin-bottom: 10px; display: none; }

    .painel { display: none; max-width: 960px; margin: 0 auto; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0 1.25rem; flex-wrap: wrap; gap: 10px; }
    .top-bar h1 { font-size: 20px; font-weight: 600; }

    .btn-submit { width: 100%; padding: 12px; font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; }
    .btn-submit:hover { opacity: 0.85; }
    .btn-sm { padding: 9px 20px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; white-space: nowrap; }
    .btn-sm:hover { opacity: 0.85; }
    .btn-outline { padding: 7px 14px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: none; color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; }
    .btn-outline:hover { background: var(--surface); }
    .btn-danger { padding: 6px 12px; font-size: 12px; font-family: 'DM Sans', sans-serif; background: #fde8e8; color: #c0392b; border: 1px solid #f5c6c6; border-radius: var(--radius-sm); cursor: pointer; }
    .btn-danger:hover { background: #f5c6c6; }

    .tabs { display: flex; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 1rem; }
    .tab { flex: 1; padding: 11px; text-align: center; font-size: 14px; font-family: 'DM Sans', sans-serif; cursor: pointer; background: transparent; color: var(--text-muted); border: none; transition: all 0.15s; }
    .tab.active { background: var(--accent); color: #fff; font-weight: 500; }
    .section { display: none; }
    .section.active { display: block; }

    /* FILTROS */
    .filtros-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
    .filtros-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .filtros-grid2 { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
    .filtros-box label { display: block; font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 5px; }
    .filtros-box input, .filtros-box select { width: 100%; padding: 9px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; }
    .filtros-box input:focus, .filtros-box select:focus { border-color: var(--border-mid); background: #fff; }

    .resumo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1rem; }
    .resumo-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem 0.75rem; text-align: center; }
    .resumo-card .num { font-size: 22px; font-weight: 600; }
    .resumo-card .lbl { font-size: 11px; color: var(--text-muted); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.3px; }

    .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; }
    .badge-chegada { background: #e1f5ee; color: #0f6e56; }
    .badge-saida   { background: #e6f1fb; color: #185fa5; }
    .badge-apoio   { background: #faeeda; color: #854f0b; }
    .badge-trf     { background: #eeedfe; color: #534ab7; }

    table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); font-size: 13px; }
    thead { background: var(--bg); }
    th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid var(--border); }
    td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf8; }
    .guia-nome { font-weight: 500; }
    .motorista-nome { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .obs-txt { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-style: italic; white-space: pre-line; }

    .search-bar { margin-bottom: 1rem; }
    .search-bar input { width: 100%; padding: 10px 14px; font-size: 14px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); outline: none; }
    .search-bar input:focus { border-color: var(--border-mid); }

    .guia-lista { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .guia-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .guia-row:last-child { border-bottom: none; }
    .guia-row-nome { font-size: 14px; font-weight: 500; }
    .guia-row-status { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .badge-cadastrado { background: #e1f5ee; color: #0f6e56; font-size: 11px; padding: 2px 8px; border-radius: 99px; }
    .badge-pendente { background: #faeeda; color: #854f0b; font-size: 11px; padding: 2px 8px; border-radius: 99px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .modal { background: var(--surface); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 360px; margin: 1rem; }
    .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 1rem; }
    .modal input { width: 100%; padding: 10px 12px; font-size: 15px; font-family: 'DM Sans', sans-serif; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; margin-bottom: 12px; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns button { flex: 1; }

    .empty { text-align: center; padding: 3rem; color: var(--text-hint); font-size: 14px; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(245,244,240,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(2px); }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .filtros-grid { grid-template-columns: 1fr 1fr; }
      .filtros-grid2 { grid-template-columns: 1fr 1fr; }
      .resumo-grid { grid-template-columns: repeat(2, 1fr); }
      table { font-size: 12px; }
      th, td { padding: 8px 10px; }
    }
  </style>
</head>

            <option>MARCOS F</option><option>MADALENA</option><option>ARLINDO</option>
          </select>
        </div>
      </div>
      <div class="filtros-grid2">
        <div>
          <label>Serviço</label>
          <select id="f-servico">
            <option value="">Todos</option>
            <optgroup label="Chegada">
              <option value="chegada-porto">Chegada Porto</option>
              <option value="chegada-cabo">Chegada Cabo</option>
              <option value="chegada-maragogi">Chegada Maragogi</option>
              <option value="chegada-recife">Chegada Recife</option>
            </optgroup>
            <optgroup label="Saída">
              <option value="saida-porto">Saída Porto</option>
              <option value="saida-cabo">Saída Cabo</option>
              <option value="saida-maragogi">Saída Maragogi</option>
              <option value="saida-recife">Saída Recife</option>
            </optgroup>
            <optgroup label="Apoio">
              <option value="apoio-porto">Apoio Porto</option>
              <option value="apoio-recife">Apoio Recife</option>
            </optgroup>
            <option value="trf">TRF</option>
          </select>
        </div>
        <div>
          <label>Voo</label>
          <input type="text" id="f-voo" placeholder="ex: LA3456" style="text-transform:uppercase;" />
        </div>
        <div></div>
        <div style="display:flex;align-items:flex-end;">
          <button class="btn-sm" style="width:100%;" onclick="buscar()">Buscar</button>
        </div>
      </div>
    </div>
    <div class="resumo-grid" id="resumo-grid"></div>
    <div id="tabela-wrap"></div>
  </div>

  <!-- ABA SENHAS -->
  <div id="sec-senhas" class="section">
    <div class="search-bar">
      <input type="text" id="busca-guia" placeholder="🔍 Buscar guia..." oninput="filtrarGuias()" />
    </div>
    <div class="guia-lista" id="guia-lista"></div>
  </div>
</div>

<!-- MODAL RESET SENHA -->
<div class="modal-overlay" id="modal-reset" style="display:none;">
  <div class="modal">
    <h3>Redefinir senha</h3>
    <p id="modal-desc"></p>
    <input type="password" id="modal-nova-senha" placeholder="Nova senha (mín. 4 caracteres)" />
    <div class="modal-btns">
      <button class="btn-outline" onclick="fecharModal()">Cancelar</button>
      <button class="btn-sm" onclick="confirmarReset()">Salvar</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, query, where, orderBy, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyCFom_SD6rklJ3hTJHC5_VF34TiDYKn-ak",
    authDomain: "relatorio-guias.firebaseapp.com",
    projectId: "relatorio-guias",
    storageBucket: "relatorio-guias.firebasestorage.app",
    messagingSenderId: "1078535122546",
    appId: "1:1078535122546:web:fb1669ddaa66a4e5a1dceb"
  });
  const db = getFirestore(app);
  window._db = db;
  window._fbReady = true;
  window._collection = collection;
  window._query = query;
  window._where = where;
  window._orderBy = orderBy;
  window._getDocs = getDocs;
  window._doc = doc;
  window._getDoc = getDoc;
  window._setDoc = setDoc;
  document.getElementById('fb-status').textContent = '✅ Conectado';
</script>

<script>
const SENHA_ADMIN = 'luck1960';
const LABELS = {
  'chegada-porto':'Chegada Porto','chegada-cabo':'Chegada Cabo','chegada-maragogi':'Chegada Maragogi','chegada-recife':'Chegada Recife',
  'saida-porto':'Saída Porto','saida-cabo':'Saída Cabo','saida-maragogi':'Saída Maragogi','saida-recife':'Saída Recife',
  'apoio-porto':'Apoio Porto','apoio-recife':'Apoio Recife','trf':'TRF'
};
const BADGE = {
  'chegada-porto':'badge-chegada','chegada-cabo':'badge-chegada','chegada-maragogi':'badge-chegada','chegada-recife':'badge-chegada',
  'saida-porto':'badge-saida','saida-cabo':'badge-saida','saida-maragogi':'badge-saida','saida-recife':'badge-saida',
  'apoio-porto':'badge-apoio','apoio-recife':'badge-apoio','trf':'badge-trf'
};
const TODOS_GUIAS = [
  'JUNIOR','POLLY','NATALIA','GEORGE','KATARINA','EDMILTON','EVILAZIO','LUCIENE','VITOR','ERLON',
  'HENRIQUE JR','FELIPE','EDSON','TATIANA','TOM JONES','ADRIANE','GUILHERME','FÁBIO GOMES','DANIEL','NEIDE',
  'JUAN','EUGENIO','VALTER','GONÇALVES','ANTÔNIO','GERARDO','ELANE','HUGO','JOEL','HENRIQUE FARIAS',
  'CHICO DINIZ','MARILANDE','WIRON','IANNE','ADIANÊS','MADSON','CAMILLA','ANDRÉ','ANA FLÁVIA','RENATA',
  'GESSYCA','TAVARES','MATHEUS','ALICE','LIDIANE','CARLA','ALBERTO','XIMENES','SIDNEI','DRIELLY',
  'RAÍSSA','ISADORA','SANTIAGO','ARTHUR','GIL','HUMBERTO','FÁBIO COZZI','BRENO','LUIZ CARLOS','RODRIGO',
  'JOELMA','OLIVEIRA','BRUNO M','TALES','FRANCINALDO','AMAURY','ARLENE','JACIANE','FRANÇA','FREITAS',
  'LUIZ FELIPE','RAFAEL','JULIANA','DEYVISON','ALEX','RUTH','CAMILA','GLÓRIA','ELISIO','REBECA',
  'ENEZIANE','BRUNO S','ALVARO','ZENA','CARLOS M','CHICO LIMA','SERGIO','LUCIA V','MARCOS F','MADALENA','ARLINDO'
];

let guiasSenhas = {};
let guiaReset = '';
let todosRelatorios = [];

function isChegada(s) { return s && s.startsWith('chegada'); }
function hoje() { return new Date().toISOString().slice(0,10); }
function inicioMes() { const d = new Date(); d.setDate(1); return d.toISOString().slice(0,10); }

function entrar() {
  if (document.getElementById('senha-input').value === SENHA_ADMIN) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('painel').style.display = 'block';
    document.getElementById('f-inicio').value = inicioMes();
    document.getElementById('f-fim').value = hoje();
    buscar();
  } else {
    document.getElementById('login-err').style.display = 'block';
    document.getElementById('senha-input').value = '';
  }
}

function sair() {
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('painel').style.display = 'none';
  document.getElementById('senha-input').value = '';
}

function trocarAba(aba) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (aba==='relatorios'&&i===0)||(aba==='senhas'&&i===1)));
  document.getElementById('sec-relatorios').classList.toggle('active', aba==='relatorios');
  document.getElementById('sec-senhas').classList.toggle('active', aba==='senhas');
  if (aba==='senhas') carregarSenhas();
}

function showLoading() {
  if (document.getElementById('loading-overlay')) return;
  const el = document.createElement('div'); el.id = 'loading-overlay'; el.className = 'loading-overlay';
  el.innerHTML = '<div class="loading-spinner"></div>'; document.body.appendChild(el);
}
function hideLoading() { const el = document.getElementById('loading-overlay'); if (el) el.remove(); }

// ---- RELATÓRIOS ----
async function buscar() {
  if (!window._fbReady) return;
  const inicio = document.getElementById('f-inicio').value;
  const fim = document.getElementById('f-fim').value;
  if (!inicio || !fim) { alert('Selecione o período.'); return; }
  const fimDate = new Date(fim + 'T12:00:00'); fimDate.setDate(fimDate.getDate() + 1);
  const fimExclusivo = fimDate.toISOString().slice(0,10);
  showLoading();
  try {
    const q = window._query(
      window._collection(window._db, 'relatorios'),
      window._where('data', '>=', inicio),
      window._where('data', '<', fimExclusivo),
      window._orderBy('data', 'desc')
    );
    const snap = await window._getDocs(q);
    todosRelatorios = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    aplicarFiltros();
  } catch(e) {
    document.getElementById('tabela-wrap').innerHTML = '<p class="empty">Erro: ' + e.message + '</p>';
  } finally { hideLoading(); }
}

function aplicarFiltros() {
  const fGuia = document.getElementById('f-guia').value;
  const fServico = document.getElementById('f-servico').value;
  const fVoo = document.getElementById('f-voo').value.trim().toUpperCase();

  // Filtrar relatórios e itens
  let linhas = [];
  todosRelatorios.forEach(r => {
    if (fGuia && r.guia !== fGuia) return;
    r.itens.forEach(it => {
      if (fServico && it.servico !== fServico) return;
      if (fVoo && (!it.voo || !it.voo.toUpperCase().includes(fVoo))) return;
      linhas.push({ r, it });
    });
  });

  renderPainel(linhas);
}

function renderPainel(linhas) {
  let ts = linhas.length, tp = 0, tv = 0, tn = 0;
  linhas.forEach(({ it }) => {
    if (isChegada(it.servico)) tp += (it.pax||0);
    if (it.vendas) tv += it.vendas;
    if (it.noshow) tn += it.noshow;
  });

  document.getElementById('resumo-grid').innerHTML = `
    <div class="resumo-card"><div class="num">${ts}</div><div class="lbl">serviços</div></div>
    <div class="resumo-card"><div class="num">${tp}</div><div class="lbl">pax chegada</div></div>
    <div class="resumo-card"><div class="num">R$${tv.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div><div class="lbl">vendas</div></div>
    <div class="resumo-card"><div class="num">${tn}</div><div class="lbl">no-show</div></div>`;

  if (!linhas.length) {
    document.getElementById('tabela-wrap').innerHTML = '<p class="empty">Nenhum resultado encontrado.</p>';
    return;
  }

  let rows = '';
  linhas.forEach(({ r, it }) => {
    const dataFmt = new Date(r.data+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
    let det = '';
    if (isChegada(it.servico)) {
      det = `Voo: <strong>${it.voo||'—'}</strong> · Pax: <strong>${it.pax??0}</strong> · Vendas: <strong>R$${(it.vendas||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</strong> · No-show: <strong>${it.noshow??0}</strong>`;
    } else if (it.servico && it.servico.startsWith('saida')) {
      det = `No-show: <strong>${it.noshow??0} pax</strong>`;
    } else {
      det = `Vendas: <strong>R$${(it.vendas||0).toLocaleString('pt-BR',{minimumFractionDigits:2})}</strong> · No-show: <strong>${it.noshow??0}</strong>`;
    }
    rows += `<tr>
      <td>${dataFmt}</td>
      <td><div class="guia-nome">${r.guia}</div><div class="motorista-nome">🚐 ${r.motorista}</div></td>
      <td><span class="badge ${BADGE[it.servico]||''}">${LABELS[it.servico]||it.servico}</span></td>
      <td>${det}${it.obs ? `<div class="obs-txt">📝 ${it.obs}</div>` : ''}</td>
    </tr>`;
  });

  document.getElementById('tabela-wrap').innerHTML = `
    <table>
      <thead><tr><th>Data</th><th>Guia / Motorista</th><th>Serviço</th><th>Detalhes</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ---- SENHAS ----
async function carregarSenhas() {
  if (!window._fbReady) return;
  showLoading();
  try {
    const snap = await window._getDocs(window._collection(window._db, 'guias'));
    guiasSenhas = {};
    snap.docs.forEach(d => { guiasSenhas[d.id] = d.data(); });
    renderGuias(TODOS_GUIAS);
  } catch(e) {
    document.getElementById('guia-lista').innerHTML = '<p class="empty">Erro ao carregar.</p>';
  } finally { hideLoading(); }
}

function filtrarGuias() {
  const busca = document.getElementById('busca-guia').value.toUpperCase();
  renderGuias(TODOS_GUIAS.filter(g => g.includes(busca)));
}

function renderGuias(lista) {
  if (!lista.length) { document.getElementById('guia-lista').innerHTML = '<p class="empty">Nenhum guia encontrado.</p>'; return; }
  document.getElementById('guia-lista').innerHTML = lista.map(nome => {
    const temSenha = guiasSenhas[nome] && guiasSenhas[nome].senha;
    return `<div class="guia-row">
      <div>
        <div class="guia-row-nome">${nome}</div>
        <div class="guia-row-status">${temSenha ? '<span class="badge-cadastrado">✅ Senha cadastrada</span>' : '<span class="badge-pendente">⏳ Sem senha</span>'}</div>
      </div>
      <button class="btn-danger" onclick="abrirReset('${nome}')">Redefinir senha</button>
    </div>`;
  }).join('');
}

function abrirReset(nome) {
  guiaReset = nome;
  document.getElementById('modal-desc').textContent = `Defina uma nova senha para ${nome}.`;
  document.getElementById('modal-nova-senha').value = '';
  document.getElementById('modal-reset').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-nova-senha').focus(), 100);
}

function fecharModal() {
  document.getElementById('modal-reset').style.display = 'none';
  guiaReset = '';
}

async function confirmarReset() {
  const nova = document.getElementById('modal-nova-senha').value;
  if (nova.length < 4) { alert('A senha deve ter pelo menos 4 caracteres.'); return; }
  showLoading();
  try {
    await window._setDoc(window._doc(window._db, 'guias', guiaReset), { senha: nova });
    guiasSenhas[guiaReset] = { senha: nova };
    fecharModal();
    filtrarGuias();
    alert(`Senha de ${guiaReset} redefinida com sucesso!`);
  } catch(e) {
    alert('Erro: ' + e.message);
  } finally { hideLoading(); }
}
</script>
</body>
</html>
